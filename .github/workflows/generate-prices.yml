name: Generate Fuel Prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-prices:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Istanbul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate prices.json
        run: node main.js

      - name: Commit and push prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- prices.json; then
            echo "No changes detected in prices.json"
            exit 0
          fi

          git add prices.json
          git commit -m "chore: update fuel prices"
          git push